kind: Application
apiVersion: nais.io/v1alpha1
metadata:
  name: amt-enhetsregister
  namespace: amt
  labels:
    team: amt
spec:
  image: {{image}}
  port: 8080
  terminationGracePeriodSeconds: 30
  ingresses:
    - https://amt-enhetsregister.intern.nav.no
  prometheus:
    enabled: true
    path: /internal/prometheus

  startup:
    path: /internal/health/liveness
    initialDelay: 5
    periodSeconds: 5
    failureThreshold: 10
  readiness:
    path: /internal/health/readiness
  liveness:
    path: /internal/health/liveness
    timeout: 3

  replicas:
    min: 1
    max: 2
    scalingStrategy:
      cpu:
        thresholdPercentage: 500
  resources:
    requests:
      cpu: 20m
      memory: 512Mi
    limits:
      memory: 4096Mi # Trenger mye minne når man skal laste ned alle enheter
  azure:
    application:
      enabled: true
  accessPolicy:
    inbound:
      rules:
        - application: amt-arrangor
          namespace: amt
          cluster: prod-gcp
        - application: aktivitet-arena-acl
          namespace: dab
          cluster: prod-gcp
        - application: mulighetsrommet-api
          namespace: team-mulighetsrommet
          cluster: prod-gcp
    outbound:
      external:
        - host: data.brreg.no
  kafka:
    pool: nav-prod
  env:
    - name: JDK_JAVA_OPTIONS
      value: "-XX:MaxRAMPercentage=70.0 -Xshare:off --enable-native-access=ALL-UNNAMED --sun-misc-unsafe-memory-access=allow"
    - name: VIRKSOMHETER_TOPIC
      value: amt.virksomheter-v1

  gcp:
    sqlInstances:
      - name: amt-enhetsregister-2
        type: POSTGRES_17
        tier: db-custom-1-3840
        diskAutoresize: true
        databases:
          - name: amt-enhetsregister
            envVarPrefix: DB

  observability:
      autoInstrumentation:
        enabled: true
        runtime: java
      logging:
        destinations:
          - id: elastic
          - id: loki
